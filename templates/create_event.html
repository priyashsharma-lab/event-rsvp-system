{% extends "base.html" %}

{% block content %}

<section class="form-section">

    <div class="container">

        <div class="form-card">

            <div class="form-title">
                <span class="eyebrow text-aws">Create Event</span>
                <h1>Publish a New RSVP Event</h1>
                <p>Create an event and save it to Amazon DynamoDB.</p>
            </div>

            <form method="POST" enctype="multipart/form-data">

                <div class="row g-4">

                    <div class="col-md-6">

                        <label class="form-label">
                            Event Name
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="event_name"
                            placeholder="AWS Community Summit"
                            required>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Venue
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="venue"
                            placeholder="Convention Center, Bengaluru"
                            required>

                    </div>

                    <div class="col-12">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                            class="form-control"
                            name="description"
                            rows="5"
                            placeholder="Describe your event"
                            required></textarea>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">
                            Date
                        </label>

                        <input
                            type="date"
                            class="form-control"
                            name="date"
                            required>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">
                            Time
                        </label>

                        <input
                            type="time"
                            class="form-control"
                            name="time"
                            required>

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">
                            Maximum Participants
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="max_participants"
                            min="1"
                            placeholder="100"
                            required>

                    </div>

                    <div class="col-12">

                        <label class="form-label">
                            Banner Image
                        </label>

                        <input
                            type="file"
                            class="form-control"
                            name="banner"
                            accept="image/*">

                        <small class="text-muted">
                            (This will be connected to Amazon S3 in the next step.)
                        </small>

                    </div>

                </div>

                <button
                    type="submit"
                    class="btn btn-aws mt-4">

                    <i class="bi bi-cloud-plus me-2"></i>

                    Create Event

                </button>

            </form>

        </div>

    </div>

</section>

{% endblock %}
